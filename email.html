<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Sign Up</title>
<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:'Segoe UI', sans-serif;
    overflow:hidden;
}

/* Space container for stars */
#space{
    position:absolute;
    inset:0;
    z-index:0;
    overflow:hidden;
}

/* Stars animation */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0.8;
    animation: twinkle 3s linear infinite alternate, drift linear infinite;
}

@keyframes twinkle{
    to {opacity:0.3;}
}

@keyframes drift{
    0%{transform: translateY(0);}
    100%{transform: translateY(-200px);}
}

/* Centered Sign-Up Card */
.card{
    position:relative;
    z-index:1;
    background: rgba(28,28,28,0.95);
    border-radius:25px;
    padding:50px;
    max-width:400px;
    width:90%;
    text-align:center;
    box-shadow:0 0 50px #00ffff;
    animation: cardFade 1s ease forwards;
    opacity:0;
    transform:scale(0.95);
}

@keyframes cardFade{
    to{opacity:1; transform:scale(1);}
}

/* Heading */
h1{
    color:#00ffff;
    font-size:36px;
    margin-bottom:30px;
    text-shadow:0 0 15px #00ffff;
    opacity:0;
    transform:translateY(-20px);
    animation: fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{opacity:1; transform:translateY(0);}
}

/* Inputs */
input{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:16px;
    background: rgba(255,255,255,0.05);
    color:white;
    box-shadow:0 0 5px #00ffff;
    transition:0.3s all;
    opacity:0;
    transform:translateX(-20px);
    animation: inputFade 0.8s forwards;
}

input:nth-child(1){animation-delay:0.2s;}
input:nth-child(2){animation-delay:0.4s;}
input:nth-child(3){animation-delay:0.6s;}

input:focus{
    box-shadow:0 0 15px #00ffff;
}

/* Button */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    font-size:18px;
    color:white;
    background: linear-gradient(45deg, #00ffff, #0066ff);
    cursor:pointer;
    transition:0.4s all;
    opacity:0;
    transform:translateY(20px);
    animation: buttonFade 0.8s forwards;
    animation-delay:0.8s;
}

button:hover{
    transform: scale(1.05);
    box-shadow:0 0 20px #00ffff;
}

@keyframes inputFade{
    to{opacity:1; transform:translateX(0);}
}

@keyframes buttonFade{
    to{opacity:1; transform:translateY(0);}
}

/* Responsive */
@media(max-width:450px){
    .card{
        padding:30px;
    }
    h1{
        font-size:28px;
    }
}
</style>
</head>
<body>

<!-- Space container -->
<div id="space"></div>

<!-- Sign-Up Card -->
<div class="card">
    <h1>Sign Up</h1>
    <form id="form">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Submit</button>
    </form>
</div>

<script>
// Create animated stars
const space = document.getElementById('space');
for(let i=0;i<120;i++){
    const star = document.createElement('div');
    star.classList.add('star');
    star.style.left = Math.random()*100 + 'vw';
    star.style.top = Math.random()*100 + 'vh';
    star.style.width = 1 + Math.random()*2 + 'px';
    star.style.height = star.style.width;
    star.style.animationDuration = (2+Math.random()*3)+'s';
    space.appendChild(star);
}

// Form submit redirect
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("name").value;
    window.location.href = `success.html?name=${encodeURIComponent(name)}`;
});
</script>

</body>
</html>
